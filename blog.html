<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blog | Hoài Đặng</title>
  <meta name="description" content="Blog của Hoài Đặng chia sẻ cuộc sống ở Mỹ, kinh doanh tiệm nail, Texas, và những trải nghiệm thật của người Việt tại Mỹ." />

  <link rel="icon" type="image/jpeg" href="/profile.jpeg" />

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#5f6dfb,#b16cff);
      color:#222;
    }

    .container{
      max-width:900px;
      margin:50px auto;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.18);
    }

    h1{
      margin-top:0;
      font-size:38px;
      text-align:center;
    }

    .sub{
      text-align:center;
      color:#666;
      margin-bottom:30px;
      line-height:1.6;
    }

    .post-list{
      display:grid;
      gap:18px;
    }

    .post{
      display:block;
      text-decoration:none;
      color:#222;
      background:#f7f7f7;
      padding:18px 20px;
      border-radius:14px;
      transition:0.2s ease;
      border:1px solid #ececec;
    }

    .post:hover{
      background:#efefef;
      transform:translateY(-2px);
    }

    .post-title{
      font-size:22px;
      font-weight:700;
      margin-bottom:8px;
    }

    .post-desc{
      color:#666;
      line-height:1.6;
    }

    .back{
      display:inline-block;
      margin-top:30px;
      color:#5f6dfb;
      text-decoration:none;
      font-weight:700;
    }

</head>
<body>
  <div class="container">

    <p class="sub">

    <div class="post-list">
      <a class="post" href="/lam-nail-o-my-kiem-bao-nhieu.html">

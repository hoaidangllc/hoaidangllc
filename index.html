<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoài Đặng</title>
  <meta name="description" content="Hoài Đặng - Chia sẻ cuộc sống người Việt tại Mỹ, công việc, kinh doanh tiệm nail và những trải nghiệm thật tại Texas." />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.2);
    }

    .avatar {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      display: block;
      margin: 0 auto 18px;
      background: #fff;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .tagline {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .desc {
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 22px;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: white;
      color: #222;
      padding: 16px;
      border-radius: 16px;
      margin: 12px 0;
      font-weight: bold;
      font-size: 16px;
    }

    .footer {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="profile.jpeg" alt="Hoài Đặng" class="avatar">

    <h1>Hoài Đặng</h1>

    <div class="tagline">Cuộc sống ở Mỹ • Kinh doanh • Chuyện thật mỗi ngày</div>

    <p class="desc">
      Chia sẻ cuộc sống người Việt tại Mỹ, công việc, kinh doanh tiệm nail
      và những góc nhìn rất thật ở Texas.
    </p>

    <a class="btn" href="https://www.tiktok.com/@hoaidangllc" target="_blank">TikTok</a>
    <a class="btn" href="https://www.facebook.com/hoaidangllc" target="_blank">Facebook</a>
    <a class="btn" href="https://www.youtube.com/@hoaidangllc" target="_blank">YouTube</a>
    <a class="btn" href="https://annienail.com" target="_blank">Annie’s Nails & Spa</a>

    <div class="footer">
      Odessa, Texas – USA
    </div>
  </main>
</body>
</html>
